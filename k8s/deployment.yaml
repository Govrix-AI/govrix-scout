apiVersion: apps/v1
kind: Deployment
metadata:
  name: govrix
  namespace: govrix
  labels:
    app: govrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: govrix
  template:
    metadata:
      labels:
        app: govrix
    spec:
      containers:
      - name: govrix
        image: govrix:latest
        ports:
        - containerPort: 4000
          name: proxy
        - containerPort: 4001
          name: api
        - containerPort: 4443
          name: mtls
        env:
        - name: GOVRIX_LOG_LEVEL
          value: "info"
        - name: GOVRIX_LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: govrix-secrets
              key: GOVRIX_LICENSE_KEY
        - name: GOVRIX_CONFIG
          value: "/etc/govrix/govrix.toml"
        - name: AGENTMESH_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: govrix-secrets
              key: AGENTMESH_DATABASE_URL
        - name: AGENTMESH_API_KEY
          valueFrom:
            secretKeyRef:
              name: govrix-secrets
              key: AGENTMESH_API_KEY
              optional: true
        volumeMounts:
        - name: config
          mountPath: /etc/govrix
        livenessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: govrix-config
