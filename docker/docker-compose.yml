version: '3.9'

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  agentmesh:
    driver: bridge

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: agentmesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentmesh
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Run migrations on first start
      - ../migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - agentmesh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh -d agentmesh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── AgentMesh Proxy + API ──────────────────────────────────────────────────
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentmesh-proxy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTMESH_DATABASE__URL: postgres://agentmesh:agentmesh_dev@postgres:5432/agentmesh
      AGENTMESH_DATABASE__MAX_CONNECTIONS: "20"
      AGENTMESH_DATABASE__MIN_CONNECTIONS: "2"
      AGENTMESH_PROXY__LISTEN_ADDR: "0.0.0.0:4000"
      AGENTMESH_API__LISTEN_ADDR: "0.0.0.0:4001"
      AGENTMESH_METRICS__LISTEN_ADDR: "0.0.0.0:9090"
      AGENTMESH_LOG: "agentmesh=info,tower_http=debug"
      RUST_LOG: "agentmesh=info"
    ports:
      - "4000:4000"   # Proxy (hot path)
      - "4001:4001"   # REST API
      - "9090:9090"   # Prometheus metrics
    networks:
      - agentmesh
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React Dashboard (nginx) ────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: agentmesh-dashboard
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - agentmesh
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
